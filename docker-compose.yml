version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: contacts_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: contacts_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d contacts_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contacts_web
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres123@db:5432/contacts_db?schema=public"
      JWT_SECRET: "your-super-secret-enterprise-jwt-key-2026"
      NODE_ENV: "production"
      NEXT_PUBLIC_API_URL: "http://localhost:3000"

volumes:
  postgres_data:
    driver: local
